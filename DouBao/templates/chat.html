<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python即时通讯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* 整体容器 */
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* 登录区域样式 */
        #login-area {
            padding: 60px 40px;
            text-align: center;
        }
        #login-area h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        #username-input {
            width: 70%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-right: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        #username-input:focus {
            border-color: #667eea;
        }
        #login-area button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #login-area button:hover {
            transform: translateY(-2px);
        }
        /* 聊天区域样式 */
        #chat-area {
            display: none;
            height: 600px;
            flex-direction: column;
        }
        #chat-header {
            padding: 15px 20px;
            background: #667eea;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f9f9f9;
        }
        #chat-container div {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 70%;
        }
        /* 消息样式区分 */
        .system-msg {
            color: #666;
            font-style: italic;
            background: #e9e9e9 !important;
            margin: 0 auto !important;
            max-width: 80% !important;
        }
        .private-msg {
            background: #f0e6ff !important;
            color: #d63384;
        }
        .self-msg {
            background: #667eea !important;
            color: white;
            margin-left: auto !important;
        }
        .other-msg {
            background: #ffffff !important;
            border: 1px solid #e0e0e0;
        }
        /* 输入区域样式 */
        #input-area {
            padding: 15px 20px;
            background: white;
            display: flex;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        #message-input:focus {
            border-color: #667eea;
        }
        #send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #send-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录区域 -->
        <div id="login-area">
            <h1>Python 即时通讯</h1>
            <input type="text" id="username-input" placeholder="请输入你的用户名" required>
            <button onclick="login()">进入聊天</button>
        </div>

        <!-- 聊天区域（初始隐藏） -->
        <div id="chat-area">
            <div id="chat-header">聊天窗口 - <span id="current-user"></span></div>
            <div id="chat-container"></div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="输入消息（点对点消息格式：用户名: 消息）">
                <button id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let username;

        // 登录函数
        function login() {
            username = document.getElementById('username-input').value.trim();
            if (!username) {
                alert("请输入用户名！");
                return;
            }

            // 更新页面显示
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
            document.getElementById('current-user').textContent = username;

            // 建立WebSocket连接
            ws = new WebSocket(`ws://${window.location.host}/ws/${username}`);

            // 接收消息（包括历史消息和实时消息）
            ws.onmessage = function(event) {
                const chatContainer = document.getElementById('chat-container');
                const msgElement = document.createElement('div');
                const msgContent = event.data;

                // 标记不同类型的消息
                if (msgContent.includes("系统提示") || msgContent.includes("暂无历史消息") || msgContent.includes("以下是历史消息")) {
                    msgElement.className = "system-msg";
                } else if (msgContent.includes("(私聊)")) {
                    msgElement.className = "private-msg";
                } else if (msgContent.startsWith(`[我->`)) {
                    msgElement.className = "self-msg";
                } else if (msgContent.startsWith(`[${username}]`)) {
                    msgElement.className = "self-msg";
                } else {
                    msgElement.className = "other-msg";
                }

                msgElement.textContent = msgContent;
                chatContainer.appendChild(msgElement);
                // 自动滚动到底部
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };

            // 连接关闭
            ws.onclose = function() {
                alert("连接已断开，请刷新页面重新登录！");
                window.location.reload();
            };

            // 连接错误
            ws.onerror = function(error) {
                alert(`连接出错：${error}`);
            };
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message || !ws) {
                return;
            }
            ws.send(message);
            input.value = ''; // 清空输入框
        }

        // 按Enter键发送消息
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
